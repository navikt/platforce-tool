apiVersion: "nais.io/v1alpha1"
kind: "Application"
metadata:
  name: platforce-tool
  namespace: platforce
  labels:
    team: platforce
spec:
  image: "{{ image }}"
  port: 8080
  replicas:
    min: 1
    max: 1
  liveness:
    path: /internal/isAlive
  readiness:
    path: /internal/isReady
  prometheus:
    enabled: true
    path: /internal/metrics
  observability:
    logging:
      destinations:
        - id: loki
  resources:
    limits:
      memory: 2Gi
    requests:
      cpu: 10m
      memory: 512Mi
  gcp:
    sqlInstances:
      - type: POSTGRES_18
        tier: db-f1-micro
        databases:
          - name: platforce-tool
  ingresses:
    - "https://platforce-tool.intern.nav.no"
  azure:
    application:
      enabled: true
      allowAllUsers: true
      claims:
        extra:
          - azp_name
          - NAVident
  #    sidecar:
  #      enabled: false
  #  accessPolicy:
  #    inbound:
  #      rules:
  #        - application: salesforce
  #          namespace: teamcrm
  #          cluster: prod-external
  envFrom:
    - secret: platforce-tool
  env:
    - name: AN_ENV
      value: "a value in dev"
