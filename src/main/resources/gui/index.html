<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Dependency Scanner</title>
    <link rel="stylesheet" href="/internal/gui/styles.css">
</head>

<body>

<div class="page-title">
    Dependency Scanner
    <button id="scrollToTargets" class="btn-secondary">
        Target Versions ↓
    </button>
</div>

<div class="toolbar">
    <button id="refreshBtn">Refresh scan</button>

    <div id="progressWrapper">
        <div id="progressText">Idle</div>
        <div class="bar">
            <div id="progressBar"></div>
        </div>
    </div>
</div>

<div id="container"></div>

<div id="targetVersionsSection" class="section">

    <h2>Target Versions</h2>

    <h3>Plugins</h3>
    <div id="pluginsTable"></div>

    <h3>Dependencies</h3>
    <div id="depsTable"></div>

    <button id="saveTargets" class="btn-primary">
        Save Target Versions
    </button>

</div>

<script src="/internal/gui/script.js"></script>
</body>
</html>
