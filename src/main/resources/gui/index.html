<!DOCTYPE html>
<html>
<head>
    <link rel="shortcut icon" type="image/x-icon" href="/internal/gui/platforce.png">
    <meta charset="UTF-8">
    <title>Dependency Scanner</title>
    <link rel="stylesheet" href="/internal/gui/styles.css">
</head>

<body>

<div class="tabs">
    <div
            class="tab active"
            data-tab="scanner">
        Dependency Scanner
    </div>
    <div
            class="tab"
            data-tab="targets">
        Target Versions
    </div>
    <div
            class="tab"
            data-tab="ignored">
        Ignored
    </div>
</div>

<div id="scannerTab">

    <div class="toolbar">
        <button id="refreshBtn">Refresh scan</button>

        <div id="progressWrapper">
            <div id="progressText">Idle</div>
            <div class="bar">
                <div id="progressBar"></div>
            </div>
        </div>
    </div>

    <div id="container"></div>

</div>

<div id="targetsTab" style="display:none">

    <div id="targetVersionsCard" class="repo open">

        <div class="target-content">

            <div class="target-grid">

                <div class="target-section plugins">

                    <div class="target-section-header">
                        <span class="section-pill plugin-pill">
                            Plugins
                        </span>
                    </div>
                    <div id="pluginsTable"></div>
                </div>

                <div class="target-section dependencies">
                    <div class="target-section-header">
                        <span class="section-pill dependency-pill">
                            Dependencies
                        </span>
                    </div>
                    <div id="depsTable"></div>
                </div>
            </div>

            <div class="target-actions">
                <button id="saveTargets" class="btn-primary">
                    Save Target Versions
                </button>
            </div>

        </div>

    </div>
</div>

<div id="ignoredTab" class="tab-content">

    <div class="target-card">

        <div class="section-pill">
            Ignored Repositories
        </div>

        <div id="ignoredReposTable"></div>

    </div>

</div>

<script src="/internal/gui/script.js"></script>
</body>
</html>
